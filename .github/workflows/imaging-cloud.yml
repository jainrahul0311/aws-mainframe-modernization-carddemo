# =============================================================================
#  Imaging Cloud Analyzer - GitHub Action
# =============================================================================
#  Runs the CAST Imaging Cloud analyzer on this repository.
#    * Automatically -> when a pull request is merged into master / main
#    * Manually       -> from the "Actions" tab via the "Run workflow" button
#
#  DEBUG CAPTURE (optional, manual runs only):
#  Start the workflow by hand with "Debug mode" ON to zip one folder from the
#  analyzer's results and attach it to the run as a downloadable artifact.
#  Which folder is controlled by CAPTURE_DIR in the job below (default: LISA).
# =============================================================================

name: Imaging Cloud Analyzer Action

on:
  # Run automatically once a PR is merged into these branches.
  pull_request:
    types: [closed]
    branches: [master, main]

  # Let anyone start it by hand from the Actions tab, with an optional debug toggle.
  workflow_dispatch:
    inputs:
      debug:
        description: 'Debug mode: zip the captured folder and attach it to this run'
        type: boolean
        default: false

# Least privilege: this job only reads the repo.
permissions:
  contents: read

# Don't let overlapping runs on the same branch pile up.
concurrency:
  group: imaging-cloud-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGING_CLOUD_ACTION_FILE_VERSION: '1'

jobs:
  run-imaging-cloud-analyzer:
    if: github.event.pull_request.merged == true || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    env:
      # -----------------------------------------------------------------------
      #  DEBUG CAPTURE: which folder do you want to download?
      #  Path of the folder to zip, RELATIVE TO the analyzer's results folder.
      #  The whole folder is zipped (the folder itself is the top entry in the
      #  zip) and the artifact is named after it (e.g. "LISA").
      #  Change this one line to capture a different folder.
      # -----------------------------------------------------------------------
      CAPTURE_DIR: deep-analysis/deep-analysis/WorkFolders/LISA

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare results directory
        run: |
          mkdir -p "${RUNNER_TEMP}/results"
          chmod 777 "${RUNNER_TEMP}/results"   # the container runs as a different user and must write here

      - name: Run Imaging Cloud Action
        env:
          IMAGING_CLOUD_API_KEY: ${{ secrets.IMAGING_CLOUD_API_KEY }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
          BRANCH_NAME: ${{ github.ref_name }}
          COMMIT_ID: ${{ github.sha }}
          IMAGING_CLOUD_URL: 'https://dev.castimaging.io'
        run: |
          set -o pipefail
          docker run --rm \
            -v "${{ github.workspace }}:/home/carl/extras/source" \
            -v "${RUNNER_TEMP}/results:/home/carl/extras/results" \
            -e IMAGING_CLOUD_API_KEY="$IMAGING_CLOUD_API_KEY" \
            -e REPO_URL="$REPO_URL" \
            -e BRANCH_NAME="$BRANCH_NAME" \
            -e COMMIT_ID="$COMMIT_ID" \
            -e IMAGING_CLOUD_ACTION_FILE_VERSION="$IMAGING_CLOUD_ACTION_FILE_VERSION" \
            -e IMAGING_CLOUD_URL="$IMAGING_CLOUD_URL" \
            castimaging/imaging-cloud-action:dev \
            2>&1 | tee "${RUNNER_TEMP}/results/run.log"

      # ---- Debug capture: only on manual runs with "Debug mode" enabled ----
      #  (On automatic PR-merge runs there is no debug toggle, so these skip.)
      - name: Zip the captured folder (debug mode only)
        if: ${{ always() && inputs.debug }}
        run: |
          results="${RUNNER_TEMP}/results"
          # The container wrote these files as a different user; take ownership so we can read them.
          sudo chown -R "$(id -u):$(id -g)" "$results" || true

          if [ ! -d "$results/$CAPTURE_DIR" ]; then
            echo "::warning::'$CAPTURE_DIR' not found under results - did the analyzer produce it?"
            exit 0
          fi

          # Zip the folder itself (inclusive), then name the artifact after it.
          ( cd "$results/$(dirname "$CAPTURE_DIR")" && zip -r -9 "$RUNNER_TEMP/capture.zip" "$(basename "$CAPTURE_DIR")" )
          echo "CAPTURE_DIR_NAME=$(basename "$CAPTURE_DIR")" >> "$GITHUB_ENV"

      - name: Upload captured folder as artifact (debug mode only)
        if: ${{ always() && inputs.debug && env.CAPTURE_DIR_NAME != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.CAPTURE_DIR_NAME }}     # artifact is named after the captured folder, e.g. "LISA"
          path: ${{ runner.temp }}/capture.zip
          retention-days: 1
          if-no-files-found: warn
          compression-level: 0   # already a .zip; skip pointless re-compression
